api:
    dashboard: true
    insecure: true

log:
    level: INFO

entryPoints:
    web:
        address: ':80'
        http:
            redirections:
                entryPoint:
                    to: websecure
                    scheme: https
                    permanent: true
    websecure:
        address: ':443'

providers:
    docker:
        endpoint: unix:///var/run/docker.sock
        exposedByDefault: false
        network: paulserban-local
    file:
        directory: /etc/traefik/dynamic
        watch: true
