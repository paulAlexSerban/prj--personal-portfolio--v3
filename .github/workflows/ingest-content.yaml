name: Ingest Content

on:
    workflow_dispatch:
    workflow_run:
        workflows:
            - CI
        types:
            - completed
        branches:
            - main

concurrency:
    group: ingest-content-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    ingest:
        if: >-
            github.event_name == 'workflow_dispatch' ||
            github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  ref: ${{ github.event.workflow_run.head_sha || github.sha }}

            - name: Setup monorepo
              uses: ./.github/actions/setup-monorepo

            - name: Apply database migrations
              run: pnpm db:migrate

            - name: Clone and ingest content
              env:
                  GITHUB_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
                  CONTENT_REPO_GIT_URL: https://github.com/paulAlexSerban/content--paulserban.eu.git
              run: pnpm start

            - name: Upload content database artifact
              uses: actions/upload-artifact@v4
              with:
                  name: content-db-${{ github.run_number }}-${{ github.run_id }}
                  path: database/output/
                  retention-days: 30
                  if-no-files-found: error
