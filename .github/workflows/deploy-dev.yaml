name: Deploy DEV (GitHub Pages)

on:
    workflow_dispatch:
    push:
        branches: [main]

concurrency:
    group: pages
    cancel-in-progress: false

permissions:
    contents: read
    pages: write
    id-token: write

env:
    DATABASE_PATH: ${{ github.workspace }}/database/output/content.db
    CONTENT_DIR: ${{ github.workspace }}/content/live/content/publish
    QUIZ_DATA_OUT: ${{ github.workspace }}/frontend/apps/quiz-web-app/public/data

jobs:
    ingest:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v7
            - uses: ./.github/actions/setup-monorepo
            - run: pnpm db:migrate
            - name: Ingest content
              env:
                  GITHUB_TOKEN: ${{ secrets.CONTENT_REPO_TOKEN }}
                  CONTENT_REPO_GIT_URL: https://github.com/paulAlexSerban/content--paulserban.eu.git
              run: |
                  pnpm start

            - name: Upload content DB
              uses: actions/upload-artifact@v7
              with:
                  name: content-db
                  path: database/output/content.db
                  if-no-files-found: error
                  retention-days: 1
            - name: Upload quiz data
              uses: actions/upload-artifact@v7
              with:
                  name: quiz-data
                  path: frontend/apps/quiz-web-app/public/data/
                  if-no-files-found: error
                  retention-days: 1

