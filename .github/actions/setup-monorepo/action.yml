name: Setup monorepo
description: Install pnpm and workspace dependencies with lockfile enforcement

runs:
    using: composite
    steps:
        - name: Setup pnpm
          uses: pnpm/action-setup@v6
          with:
              version: 11.5.0

        - name: Setup Node.js
          uses: actions/setup-node@v6
          with:
              node-version-file: .nvmrc
              cache: pnpm

        - name: Install dependencies
          run: pnpm install --frozen-lockfile
          shell: bash
